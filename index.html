      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <meta name="theme-color" content="#E52521" />
    <meta
      name="description"
      content="Tracker de torneos de Mario Tennis con soporte offline y guardado local."
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="Mario Tracker" />
    <title>Mario Tennis Fever - Tournament Tracker</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./icons/icon-192.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="./icons/icon-192.svg" />

    <style>
      :root {
        --mario-red: #e52521;
        --luigi-green: #43b047;
        --peach-pink: #ff99cc;
        --star-yellow: #fbd000;
        --sky-blue: #00bfff;
        --waluigi-purple: #8a2be2;
        --dark-border: #2a2a2a;
        --court-green: #689f38;
        --court-light: #8bc34a;
        --bg-color: #f0f4f8;
        --card-bg: #ffffff;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }

      body {
        font-family: "Nunito", sans-serif;
        background-color: var(--court-green);
        background-image:
          linear-gradient(rgba(255, 255, 255, 0.15) 2px, transparent 2px),
          linear-gradient(90deg, rgba(255, 255, 255, 0.15) 2px, transparent 2px);
        background-size: 40px 40px;
        color: var(--dark-border);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      h1,
      h2,
      h3,
      h4 {
        font-family: "Fredoka One", cursive;
        text-shadow: 2px 2px 0px rgba(0, 0, 0, 0.1);
      }

      header {
        background-color: var(--mario-red);
        color: white;
        padding: 15px 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 6px solid var(--dark-border);
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.2);
        position: sticky;
        top: 0;
        z-index: 100;
      }

      .title-container {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        justify-content: flex-end;
      }

      .status-pill {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 42px;
        padding: 8px 12px;
        border: 4px solid var(--dark-border);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.18);
        color: white;
        font-family: "Fredoka One", cursive;
        font-size: 0.85rem;
        white-space: nowrap;
      }

      .status-online {
        background: rgba(67, 176, 71, 0.95);
      }

      .status-offline {
        background: rgba(42, 42, 42, 0.95);
      }

      .hidden {
        display: none !important;
      }

      #tournament-name {
        background: transparent;
        border: none;
        color: white;
        font-family: "Fredoka One", cursive;
        font-size: 1.5rem;
        width: 100%;
        max-width: 300px;
        cursor: pointer;
        border-bottom: 2px dashed rgba(255, 255, 255, 0.5);
      }

      #tournament-name:focus {
        outline: none;
        border-bottom: 2px solid white;
        background: rgba(0, 0, 0, 0.1);
        border-radius: 4px;
      }

      .btn {
        font-family: "Fredoka One", cursive;
        background: var(--card-bg);
        border: 4px solid var(--dark-border);
        border-radius: 12px;
        padding: 10px 20px;
        font-size: 1rem;
        cursor: pointer;
        box-shadow: 0 4px 0 var(--dark-border);
        transition: all 0.1s;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 8px;
        color: var(--dark-border);
      }

      .btn:active {
        transform: translateY(4px);
        box-shadow: 0 0 0 var(--dark-border);
      }

      .btn-primary {
        background: var(--star-yellow);
      }
      .btn-danger {
        background: #ff5252;
        color: white;
      }
      .btn-success {
        background: var(--luigi-green);
        color: white;
      }
      .btn-blue {
        background: var(--sky-blue);
        color: white;
      }
      .btn-small {
        padding: 5px 10px;
        font-size: 0.9rem;
        border-width: 3px;
        box-shadow: 0 3px 0 var(--dark-border);
      }

      main {
        flex: 1;
        padding: 20px;
        max-width: 1200px;
        margin: 0 auto;
        width: 100%;
      }

      .panel {
        background: var(--card-bg);
        border: 6px solid var(--dark-border);
        border-radius: 20px;
        padding: 20px;
        margin-bottom: 20px;
        box-shadow: 0 8px 0 rgba(0, 0, 0, 0.2);
      }

      /* Setup View */
      .setup-grid {
        display: grid;
        grid-template-columns: 1fr 2fr;
        gap: 20px;
      }

      @media (max-width: 768px) {
        .setup-grid {
          grid-template-columns: 1fr;
        }

        header {
          flex-direction: column;
          align-items: stretch;
          gap: 12px;
        }

        .header-actions {
          justify-content: center;
        }

        #tournament-name {
          max-width: 100%;
        }
      }

      .form-group {
        margin-bottom: 15px;
      }

      label {
        font-weight: 900;
        display: block;
        margin-bottom: 5px;
        font-size: 1.1rem;
      }

      select,
      input[type="text"],
      input[type="number"] {
        width: 100%;
        padding: 12px;
        border: 3px solid var(--dark-border);
        border-radius: 10px;
        font-family: "Nunito", sans-serif;
        font-weight: 700;
        font-size: 1rem;
      }

      .player-list {
        display: flex;
        flex-direction: column;
        gap: 10px;
        max-height: 400px;
        overflow-y: auto;
        padding-right: 5px;
      }

      .player-item {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-color);
        border: 3px solid var(--dark-border);
        border-radius: 10px;
        padding: 10px;
      }

      .player-info {
        display: flex;
        align-items: center;
        gap: 10px;
        font-weight: 700;
      }

      .char-emoji {
        font-size: 1.5rem;
      }

      .badge {
        font-size: 0.75rem;
        padding: 3px 8px;
        border-radius: 20px;
        color: white;
        font-weight: 900;
        text-transform: uppercase;
        border: 2px solid rgba(0, 0, 0, 0.2);
      }
      .type-all-around {
        background: var(--sky-blue);
      }
      .type-speedy {
        background: var(--star-yellow);
        color: var(--dark-border);
      }
      .type-powerful {
        background: var(--mario-red);
      }
      .type-technical {
        background: var(--luigi-green);
      }
      .type-tricky {
        background: var(--waluigi-purple);
      }
      .type-defensive {
        background: #607d8b;
      }

      /* Tournament Views */
      .controls-bar {
        display: flex;
        justify-content: space-between;
        margin-bottom: 15px;
        flex-wrap: wrap;
        gap: 10px;
      }

      /* Bracket */
      .bracket-container {
        display: flex;
        gap: 30px;
        overflow-x: auto;
        padding: 20px 0;
        align-items: center;
        min-height: 400px;
      }

      .bracket-round {
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        gap: 20px;
        min-width: 220px;
      }

      .match-card {
        background: white;
        border: 4px solid var(--dark-border);
        border-radius: 12px;
        box-shadow: 0 4px 0 var(--dark-border);
        cursor: pointer;
        transition: transform 0.1s;
        position: relative;
      }

      .match-card:hover {
        transform: scale(1.02);
      }
      .match-card.completed {
        opacity: 0.8;
      }
      .match-card.completed .winner {
        background-color: rgba(251, 208, 0, 0.3);
        font-weight: 900;
      }

      .match-team {
        padding: 10px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 2px solid #eee;
      }
      .match-team:last-child {
        border-bottom: none;
      }
      .team-name {
        font-weight: 700;
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 0.9rem;
      }
      .team-score {
        font-family: "Fredoka One";
        font-size: 1.2rem;
      }

      /* League Table */
      .league-table-container {
        overflow-x: auto;
      }
      table {
        width: 100%;
        border-collapse: collapse;
        background: white;
        border: 4px solid var(--dark-border);
        border-radius: 12px;
        overflow: hidden;
      }
      th,
      td {
        padding: 12px;
        text-align: center;
        border-bottom: 2px solid #eee;
      }
      th {
        background: var(--dark-border);
        color: white;
        font-family: "Fredoka One";
      }
      tr:last-child td {
        border-bottom: none;
      }
      .leader-row {
        background-color: rgba(251, 208, 0, 0.2);
      }

      /* Modals */
      .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(0, 0, 0, 0.6);
        display: none;
        justify-content: center;
        align-items: center;
        z-index: 1000;
        padding: 20px;
      }
      .modal {
        background: var(--card-bg);
        border: 6px solid var(--dark-border);
        border-radius: 20px;
        padding: 20px;
        width: 100%;
        max-width: 400px;
        box-shadow: 0 10px 25px rgba(0, 0, 0, 0.5);
        animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      }
      @keyframes popIn {
        0% {
          transform: scale(0.8);
          opacity: 0;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }

      .score-input-group {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin: 15px 0;
        padding: 10px;
        background: var(--bg-color);
        border-radius: 10px;
        border: 2px solid var(--dark-border);
      }
      .score-input-group input {
        width: 60px;
        text-align: center;
        font-size: 1.5rem;
      }

      .toast {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background: var(--dark-border);
        color: white;
        padding: 10px 20px;
        border-radius: 30px;
        font-weight: bold;
        display: none;
        z-index: 2000;
      }

      /* Stats visualizer */
      .stats-bar {
        height: 8px;
        background: #ddd;
        border-radius: 4px;
        margin-top: 5px;
        overflow: hidden;
      }
      .stats-fill {
        height: 100%;
        background: var(--mario-red);
      }
      .char-preview {
        display: flex;
        gap: 10px;
        margin-top: 10px;
        background: #f9f9f9;
        padding: 10px;
        border-radius: 8px;
        border: 2px dashed #ccc;
      }

      .seeding-controls {
        display: flex;
        gap: 5px;
      }

      .history-list {
        max-height: 300px;
        overflow-y: auto;
      }
      .history-item {
        padding: 10px;
        border-bottom: 2px solid #eee;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      #export-area {
        background: var(--card-bg);
        padding: 10px;
        border-radius: 12px;
      }
    </style>
  </head>

    <header>
      <div class="title-container">
        <span style="font-size: 2rem">🍄</span>
        <input
          type="text"
          id="tournament-name"
          value="Copa Champiñón"
          oninput="updateTournamentName()"
          onchange="updateTournamentName()"
        />
      </div>
      <div class="header-actions">
        <span id="connection-status" class="status-pill status-online"
          >🟢 Online</span
        >
        <button
          id="install-btn"
          class="btn btn-small hidden"
          onclick="installApp()"
        >
          Instalar 📲
        </button>
        <button class="btn btn-danger btn-small" onclick="confirmReset()">
          Resetear 🔄
        </button>
      </div>
    </header>

    <main id="app-content">
      <!-- Contenido inyectado por JS -->
    </main>

    <!-- Modales -->
    <div class="modal-overlay" id="score-modal">
      <div class="modal">
        <h2
          id="modal-match-title"
          style="margin-bottom: 15px; text-align: center"
        >
          Registrar Partido
        </h2>
        <div id="modal-teams-container"></div>
        <div
          style="
            display: flex;
            gap: 10px;
            justify-content: center;
            margin-top: 20px;
          "
        >
          <button class="btn btn-primary" onclick="saveScore()">
            Guardar 🏆
          </button>
          <button class="btn" onclick="closeModal('score-modal')">
            Cancelar
          </button>
        </div>
      </div>
    </div>

    <div class="toast" id="toast">Acción completada</div>

          stats: { speed: 2.5, power: 4.5, control: 2, spin: 1 },
          category: "unlockable",
        },
        {
          id: "babywaluigi",
          name: "Baby Waluigi",
          emoji: "🫆",
          type: "Defensive",
          stats: { speed: 1.5, power: 2, control: 1.5, spin: 2 },
          category: "unlockable",
        },
      ];

      // --- ESTADO GLOBAL ---
      let state = {
        name: "Copa Champiñón",
        status: "setup", // setup, active
        type: "bracket", // bracket, league
        format: "singles", // singles, doubles
        players: [],
        teams: [],
        matches: [],
        bracket: [], // [ [match, match], [match] ]
      };

      let currentMatchEditId = null;
      let deferredInstallPrompt = null;

      // --- UTILIDADES ---
      const getChar = (id) => ROSTER.find((c) => id === c.id);
      const getTeamName = (teamId) => {
        if (teamId === "BYE") return "BYE";
        const team = state.teams.find((t) => t.id === teamId);
        if (!team) return "TBD";
        return team.players
          .map((p) => {
            const char = getChar(p.charId);
            return `${char.emoji} ${p.name}`;
          })
          .join(" & ");
      };

      const showToast = (msg) => {
        const t = document.getElementById("toast");
        t.textContent = msg;
        t.style.display = "block";
        setTimeout(() => (t.style.display = "none"), 3000);
      };

      const toggleInstallButton = (visible) => {
        const button = document.getElementById("install-btn");
        if (!button) return;
        button.classList.toggle("hidden", !visible);
      };

      const updateConnectivityStatus = () => {
        const badge = document.getElementById("connection-status");
        if (!badge) return;

        const isOnline = navigator.onLine;
        badge.textContent = isOnline ? "🟢 Online" : "📴 Offline";
        badge.classList.toggle("status-online", isOnline);
        badge.classList.toggle("status-offline", !isOnline);
      };

      // --- PERSISTENCIA ---
      const saveState = () => {
        localStorage.setItem("marioTennisState", JSON.stringify(state));
      };

      const loadState = () => {
        const saved = localStorage.getItem("marioTennisState");
        if (saved) {
          try {
            state = { ...state, ...JSON.parse(saved) };
          } catch {
            localStorage.removeItem("marioTennisState");
          }
          document.getElementById("tournament-name").value = state.name;
        }
      };

      const registerServiceWorker = async () => {
        if (!("serviceWorker" in navigator)) return;

        try {
          await navigator.serviceWorker.register("./sw.js");
        } catch (error) {
          console.error("No se pudo registrar el service worker", error);
        }
      };

      const setupPwaUi = () => {
        updateConnectivityStatus();

        window.addEventListener("online", updateConnectivityStatus);
        window.addEventListener("offline", updateConnectivityStatus);

        window.addEventListener("beforeinstallprompt", (event) => {
          event.preventDefault();
          deferredInstallPrompt = event;
          toggleInstallButton(true);
          showToast("📲 La app está lista para instalar");
        });

        window.addEventListener("appinstalled", () => {
          deferredInstallPrompt = null;
          toggleInstallButton(false);
          showToast("✅ App instalada correctamente");
        });

        document.addEventListener("visibilitychange", () => {
          if (document.visibilityState === "hidden") saveState();
        });

        window.addEventListener("beforeunload", saveState);
      };

      async function installApp() {
        if (!deferredInstallPrompt) {
          showToast("ℹ️ Usa el menú del navegador si no aparece el botón");
          return;
        }

        deferredInstallPrompt.prompt();
        const { outcome } = await deferredInstallPrompt.userChoice;

        if (outcome !== "accepted") {
          showToast("Instalación cancelada");
        }

        deferredInstallPrompt = null;
        toggleInstallButton(false);
      }

      // --- LÓGICA DE NEGOCIO ---
      function addPlayer() {
        const nameInput = document.getElementById("new-player-name");
        const charSelect = document.getElementById("new-player-char");

        if (!nameInput.value.trim()) {
          showToast("⚠️ Introduce un nombre de jugador");
          return;
        }

        state.players.push({
          id: "P_" + Date.now(),
          name: nameInput.value.trim(),
          charId: charSelect.value,
        });

        nameInput.value = "";
        saveState();
        render();
        showToast("✅ Jugador añadido");
      }

      function removePlayer(id) {
        state.players = state.players.filter((p) => p.id !== id);
        saveState();
        render();
      }

      function movePlayer(index, direction) {
        if (index + direction < 0 || index + direction >= state.players.length)
          return;
        const temp = state.players[index];
        state.players[index] = state.players[index + direction];
        state.players[index + direction] = temp;
        saveState();
        render();
      }

      function startTournament() {
        const type = document.getElementById("tour-type").value;
        const format = document.getElementById("tour-format").value;

        if (state.players.length < 3) {
          showToast("⚠️ Mínimo 3 jugadores necesarios");
          return;
        }

        if (format === "doubles" && state.players.length % 2 !== 0) {
          showToast("⚠️ Para dobles se requiere un número par de jugadores");
          return;
        }

        state.type = type;
        state.format = format;
        state.status = "active";
        state.matches = [];
        state.bracket = [];

        // Generar equipos
        state.teams = [];
        if (format === "singles") {
          state.players.forEach((p) =>
            state.teams.push({ id: p.id, players: [p] }),
          );
        } else {
          for (let i = 0; i < state.players.length; i += 2) {
            state.teams.push({
              id: `T_${state.players[i].id}_${state.players[i + 1].id}`,
              players: [state.players[i], state.players[i + 1]],
            });
          }
        }

        if (type === "bracket") generateBracket();
        if (type === "league") generateLeague();

        saveState();
        render();
        showToast("🎮 ¡Torneo Iniciado!");
      }

      function generateBracket() {
        const teams = [...state.teams];
        const numTeams = teams.length;
        const nextPower2 = Math.pow(2, Math.ceil(Math.log2(numTeams)));
        const byes = nextPower2 - numTeams;

        let round1 = [];
        let matchId = 1;

        // Simple seeding: Alternar reales y BYEs
        let currentTeamIndex = 0;
        for (let i = 0; i < nextPower2 / 2; i++) {
          let t1 = teams[currentTeamIndex++];
          let t2 = i < byes ? { id: "BYE" } : teams[currentTeamIndex++];

          round1.push({
            id: "M" + matchId++,
            round: 0,
            t1: t1 ? t1.id : null,
            t2: t2 ? t2.id : null,
            s1: t2 && t2.id === "BYE" ? 1 : 0,
            s2: 0,
            status: t2 && t2.id === "BYE" ? "completed" : "pending",
            winner: t2 && t2.id === "BYE" ? (t1 ? t1.id : null) : null,
          });
        }
        state.bracket.push(round1);

        // Generar rondas futuras vacías
        let numMatches = nextPower2 / 4;
        let roundIndex = 1;
        while (numMatches >= 1) {
          let round = [];
          for (let i = 0; i < numMatches; i++) {
            round.push({
              id: "M" + matchId++,
              round: roundIndex,
              t1: null,
              t2: null,
              s1: 0,
              s2: 0,
              status: "pending",
              winner: null,
            });
          }
          state.bracket.push(round);
          numMatches /= 2;
          roundIndex++;
        }

        // Auto-avanzar BYEs
        updateBracketProgress();
      }

      function generateLeague() {
        const teams = [...state.teams];
        if (teams.length % 2 !== 0) teams.push({ id: "BYE" });

        let matchId = 1;
        const numRounds = teams.length - 1;
        const halfSize = teams.length / 2;

        for (let round = 0; round < numRounds; round++) {
          for (let i = 0; i < halfSize; i++) {
            const t1 = teams[i];
            const t2 = teams[teams.length - 1 - i];

            if (t1.id !== "BYE" && t2.id !== "BYE") {
              state.matches.push({
                id: "L" + matchId++,
                round: round + 1,
                t1: t1.id,
                t2: t2.id,
                s1: 0,
                s2: 0,
                status: "pending",
              });
            }
          }
          teams.splice(1, 0, teams.pop());
        }
      }

      function updateBracketProgress() {
        // Avanza ganadores a la siguiente ronda
        for (let r = 0; r < state.bracket.length - 1; r++) {
          for (let m = 0; m < state.bracket[r].length; m++) {
            const match = state.bracket[r][m];
            const nextMatchIndex = Math.floor(m / 2);
            const nextMatch = state.bracket[r + 1][nextMatchIndex];
            const slot = m % 2 === 0 ? "t1" : "t2";

            if (match.status === "completed" && match.winner) {
              nextMatch[slot] = match.winner;
            } else {
              nextMatch[slot] = null;
              nextMatch.status = "pending"; // Invalidate
              nextMatch.winner = null;
            }
          }
        }
      }

      // --- UI RENDERING ---
      function updateTournamentName() {
        state.name = document.getElementById("tournament-name").value;
        saveState();
      }

      function render() {
        const container = document.getElementById("app-content");
        if (state.status === "setup") {
          container.innerHTML = getSetupHTML();
          updateCharPreview(); // Bind event
        } else {
          container.innerHTML = getTournamentHTML();
        }
      }

      function filterCharacters() {
        const query = (
          document.getElementById("char-search")?.value || ""
        ).toLowerCase();
        const select = document.getElementById("new-player-char");
        if (!select) return;
        Array.from(select.options).forEach((opt) => {
          const text = opt.textContent.toLowerCase();
          opt.hidden = query.length > 0 && !text.includes(query);
        });
        // Si el seleccionado queda oculto, seleccionar el primero visible
        if (select.options[select.selectedIndex]?.hidden) {
          const first = Array.from(select.options).find((o) => !o.hidden);
          if (first) {
            select.value = first.value;
            updateCharPreview();
          }
        }
      }

      function getSetupHTML() {
        const starters = ROSTER.filter((c) => c.category === "starter");
        const unlockable = ROSTER.filter((c) => c.category === "unlockable");
        const buildOptions = (arr) =>
          arr
            .map(
              (c) =>
                `<option value="${c.id}">${c.emoji} ${c.name} (${c.type})</option>`,
            )
            .join("");
        const charOptions =
          `<optgroup label="⭐ Disponibles desde el inicio (${starters.length})">${buildOptions(starters)}</optgroup>` +
          `<optgroup label="🔒 Desbloqueables (${unlockable.length})">${buildOptions(unlockable)}</optgroup>`;

        const playerList = state.players
          .map((p, index) => {
            const char = getChar(p.charId);
            return `
                <div class="player-item">
                    <div class="player-info">
                        <span class="char-emoji">${char.emoji}</span>
                        <span>${p.name}</span>
                        <span class="badge type-${char.type.toLowerCase()}">${char.type}</span>
                    </div>
                    <div class="seeding-controls">
                        <button class="btn btn-small" onclick="movePlayer(${index}, -1)" ${index === 0 ? "disabled" : ""}>⬆️</button>
                        <button class="btn btn-small" onclick="movePlayer(${index}, 1)" ${index === state.players.length - 1 ? "disabled" : ""}>⬇️</button>
                        <button class="btn btn-danger btn-small" onclick="removePlayer('${p.id}')">❌</button>
                    </div>
                </div>`;
          })
          .join("");

        return `
                <div class="panel">
                    <h2>⚙️ Configuración del Torneo</h2>
                    <p>Organiza tu campeonato de Mario Tennis. Añade jugadores y elige sus personajes.</p>
                </div>
                
                <div class="setup-grid">
                    <div class="panel">
                        <h3>Añadir Jugador</h3>
                        <div class="form-group">
                            <label>Nombre:</label>
                            <input type="text" id="new-player-name" placeholder="Ej: Player 1" onkeypress="if(event.key==='Enter') addPlayer()">
                        </div>
                        <div class="form-group">
                            <label>Personaje:</label>
                            <input type="text" id="char-search" placeholder="🔍 Buscar personaje..." oninput="filterCharacters()" style="margin-bottom:6px;">
                            <select id="new-player-char" onchange="updateCharPreview()" size="1">
                                ${charOptions}
                            </select>
                        </div>
                        <div id="char-preview-box" class="char-preview"></div>
                        <button class="btn btn-success" style="width: 100%; margin-top: 15px;" onclick="addPlayer()">Añadir Jugador ➕</button>
                    </div>

                    <div class="panel">
                        <div style="display:flex; justify-content: space-between; margin-bottom: 10px;">
                            <h3>Lista de Jugadores (${state.players.length})</h3>
                        </div>
                        <div class="player-list">
                            ${playerList || '<p style="text-align:center; color:#666;">Sin jugadores aún.</p>'}
                        </div>
                        
                        <hr style="margin: 20px 0; border: 1px solid #ddd;">
                        
                        <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                            <div class="form-group" style="flex: 1;">
                                <label>Tipo:</label>
                                <select id="tour-type">
                                    <option value="bracket">🏆 Eliminatoria (Bracket)</option>
                                    <option value="league">📊 Liga (Round Robin)</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label>Formato:</label>
                                <select id="tour-format">
                                    <option value="singles">👤 Individuales</option>
                                    <option value="doubles">👥 Dobles</option>
                                </select>
                            </div>
                        </div>
                        <button class="btn btn-primary" style="width: 100%; font-size: 1.2rem;" onclick="startTournament()">¡EMPEZAR TORNEO! 🎾</button>
                    </div>
                </div>
            `;
      }

      function updateCharPreview() {
        const select = document.getElementById("new-player-char");
        if (!select) return;
        const char = getChar(select.value);
        const box = document.getElementById("char-preview-box");
        box.innerHTML = `
                <div style="font-size: 3rem; align-self: center;">${char.emoji}</div>
                <div style="flex: 1; font-size: 0.8rem;">
                    <strong>Tipo:</strong> <span class="badge type-${char.type.toLowerCase()}">${char.type}</span><br>
                    SPD: <div class="stats-bar"><div class="stats-fill" style="width: ${(char.stats.speed / 5) * 100}%"></div></div>
                    PWR: <div class="stats-bar"><div class="stats-fill" style="width: ${(char.stats.power / 5) * 100}%"></div></div>
                    CTRL: <div class="stats-bar"><div class="stats-fill" style="width: ${(char.stats.control / 5) * 100}%"></div></div>
                    SPIN: <div class="stats-bar"><div class="stats-fill" style="width: ${(char.stats.spin / 5) * 100}%"></div></div>
                </div>
            `;
      }

      function getTournamentHTML() {
        let content = "";

        if (state.type === "bracket") {
          content = renderBracketView();
        } else {
          content = renderLeagueView();
        }

        return `
                <div class="controls-bar">
                    <button class="btn btn-blue" onclick="exportToImage()">📸 Exportar Imagen</button>
                    <button class="btn" onclick="document.getElementById('history-modal').style.display='flex'">📝 Ver Historial</button>
                </div>
                <div id="export-area">
                    ${content}
                </div>
                
                <!-- History Modal -->
                <div class="modal-overlay" id="history-modal">
                    <div class="modal" style="max-width: 500px;">
                        <h2>Historial de Partidos</h2>
                        <div class="history-list">
                            ${renderHistory()}
                        </div>
                        <button class="btn" style="width: 100%; margin-top: 15px;" onclick="closeModal('history-modal')">Cerrar</button>
                    </div>
                </div>
            `;
      }

      function renderBracketView() {
        let html = '<div class="panel bracket-container">';

        state.bracket.forEach((round, rIndex) => {
          html += `<div class="bracket-round">`;
          round.forEach((match) => {
            const isComplete = match.status === "completed";
            const t1Name = getTeamName(match.t1);
            const t2Name = getTeamName(match.t2);
            const canClick =
              match.t1 && match.t2 && match.t2 !== "BYE" && !isComplete;

            html += `
                        <div class="match-card ${isComplete ? "completed" : ""}" 
                             ${canClick ? `onclick="openScoreModal('${match.id}')"` : ""}
                             style="${!canClick && !isComplete ? "opacity:0.5; cursor:default;" : ""}">
                            <div class="match-team ${match.winner === match.t1 ? "winner" : ""}">
                                <span class="team-name">${t1Name}</span>
                                <span class="team-score">${isComplete ? match.s1 : "-"}</span>
                            </div>
                            <div class="match-team ${match.winner === match.t2 ? "winner" : ""}">
                                <span class="team-name">${t2Name}</span>
                                <span class="team-score">${isComplete ? match.s2 : "-"}</span>
                            </div>
                        </div>
                    `;
          });
          html += `</div>`;
        });
        html += "</div>";

        // Comprobar ganador final
        const finalMatch = state.bracket[state.bracket.length - 1][0];
        if (finalMatch && finalMatch.status === "completed") {
          html =
            `<div class="panel" style="text-align:center; background: var(--star-yellow); border-color: var(--star-yellow);">
                            <h2 style="color: white; font-size: 2rem;">👑 ¡CAMPEÓN! 👑</h2>
                            <h3 style="font-size: 1.5rem;">${getTeamName(finalMatch.winner)}</h3>
                        </div>` + html;
        }

        return html;
      }

      function renderLeagueView() {
        // Calcular clasificación
        let standings = state.teams.map((t) => ({
          id: t.id,
          pj: 0,
          pg: 0,
          pp: 0,
          sg: 0,
          sp: 0,
          pts: 0,
        }));

        state.matches.forEach((m) => {
          if (m.status === "completed") {
            let s1 = standings.find((s) => s.id === m.t1);
            let s2 = standings.find((s) => s.id === m.t2);

            if (s1 && s2) {
              s1.pj++;
              s2.pj++;
              s1.sg += m.s1;
              s1.sp += m.s2;
              s2.sg += m.s2;
              s2.sp += m.s1;
              if (m.s1 > m.s2) {
                s1.pg++;
                s1.pts += 3;
                s2.pp++;
              } else if (m.s2 > m.s1) {
                s2.pg++;
                s2.pts += 3;
                s1.pp++;
              } else {
                s1.pts += 1;
                s2.pts += 1;
              } // Empate
            }
          }
        });

        // Sort: Pts, Diff Sets, PG
        standings.sort((a, b) => {
          if (b.pts !== a.pts) return b.pts - a.pts;
          let diffA = a.sg - a.sp;
          let diffB = b.sg - b.sp;
          if (diffB !== diffA) return diffB - diffA;
          return b.pg - a.pg;
        });

        let tableHtml = `
                <div class="panel league-table-container">
                    <table>
                        <tr>
                            <th>Pos</th>
                            <th style="text-align: left;">Equipo/Jugador</th>
                            <th>PJ</th><th>PG</th><th>PP</th><th>Sets</th><th>Pts</th>
                        </tr>
            `;

        standings.forEach((s, idx) => {
          tableHtml += `
                    <tr class="${idx === 0 ? "leader-row" : ""}">
                        <td><strong>${idx + 1}</strong></td>
                        <td style="text-align: left; font-weight: bold;">${idx === 0 ? "⭐ " : ""}${getTeamName(s.id)}</td>
                        <td>${s.pj}</td><td>${s.pg}</td><td>${s.pp}</td>
                        <td>${s.sg} - ${s.sp}</td>
                        <td style="font-family: 'Fredoka One'; font-size: 1.2rem;">${s.pts}</td>
                    </tr>
                `;
        });
        tableHtml += `</table></div>`;

        // Partidos pendientes
        const pending = state.matches.filter((m) => m.status === "pending");
        let matchesHtml = `<div class="panel"><h3>Partidos Pendientes</h3><div style="display: flex; flex-wrap: wrap; gap: 15px; margin-top:10px;">`;

        if (pending.length === 0) {
          matchesHtml += `<p>¡Torneo finalizado!</p>`;
        } else {
          pending.forEach((m) => {
            matchesHtml += `
                        <div class="match-card" style="width: 250px;" onclick="openScoreModal('${m.id}')">
                            <div class="match-team"><span class="team-name">${getTeamName(m.t1)}</span></div>
                            <div class="match-team"><span class="team-name">${getTeamName(m.t2)}</span></div>
                        </div>
                    `;
          });
        }
        matchesHtml += `</div></div>`;

        return tableHtml + matchesHtml;
      }

      function renderHistory() {
        let matches = [];
        if (state.type === "bracket") {
          state.bracket.forEach((r) =>
            matches.push(
              ...r.filter((m) => m.status === "completed" && m.t2 !== "BYE"),
            ),
          );
        } else {
          matches = state.matches.filter((m) => m.status === "completed");
        }

        if (matches.length === 0) return "<p>No hay partidos finalizados.</p>";

        return matches
          .reverse()
          .map(
            (m) => `
                <div class="history-item">
                    <div style="font-size: 0.9rem;">
                        <strong>${getTeamName(m.t1)}</strong> (${m.s1}) vs (${m.s2}) <strong>${getTeamName(m.t2)}</strong>
                    </div>
                </div>
            `,
          )
          .join("");
      }

      // --- ACCIONES DE PARTIDO ---
      function getMatchById(id) {
        if (state.type === "league")
          return state.matches.find((m) => m.id === id);
        for (let r = 0; r < state.bracket.length; r++) {
          let m = state.bracket[r].find((m) => m.id === id);
          if (m) return m;
        }
        return null;
      }

      function openScoreModal(matchId) {
        currentMatchEditId = matchId;
        const match = getMatchById(matchId);

        let html = `
                <div class="score-input-group">
                    <span style="font-weight: 900; width: 60%;">${getTeamName(match.t1)}</span>
                    <input type="number" id="score-t1" min="0" value="${match.s1 || 0}">
                </div>
                <div style="text-align:center; font-weight: bold; margin: -10px 0;">VS</div>
                <div class="score-input-group">
                    <span style="font-weight: 900; width: 60%;">${getTeamName(match.t2)}</span>
                    <input type="number" id="score-t2" min="0" value="${match.s2 || 0}">
                </div>
            `;
        document.getElementById("modal-teams-container").innerHTML = html;
        document.getElementById("score-modal").style.display = "flex";
      }

      function closeModal(id) {
        document.getElementById(id).style.display = "none";
      }

      function saveScore() {
        const s1 = parseInt(document.getElementById("score-t1").value) || 0;
        const s2 = parseInt(document.getElementById("score-t2").value) || 0;

        if (s1 === s2 && state.type === "bracket") {
          alert("En eliminatorias no puede haber empate.");
          return;
        }

        const match = getMatchById(currentMatchEditId);
        match.s1 = s1;
        match.s2 = s2;
        match.status = "completed";
        match.winner = s1 > s2 ? match.t1 : s2 > s1 ? match.t2 : null;

        if (state.type === "bracket") {
          updateBracketProgress();
        }

        closeModal("score-modal");
        saveState();
        render();
        showToast("✅ Resultado guardado");
      }

      function confirmReset() {
        if (
          confirm(
            "¿Estás seguro de que quieres crear un torneo nuevo? Todos los datos se perderán.",
          )
        ) {
          state = {
            name: "Copa Champiñón",
            status: "setup",
            type: "bracket",
            format: "singles",
            players: [],
            teams: [],
            matches: [],
            bracket: [],
          };
          saveState();
          render();
        }
      }

      function exportToImage() {
        const element = document.getElementById("export-area");
        const originalBg = element.style.background;
        // Dar fondo blanco sólido para la exportación
        element.style.background = "var(--court-light)";
        element.style.padding = "20px";
        element.style.borderRadius = "20px";

        showToast("📸 Generando imagen...");

        html2canvas(element, { scale: 2 }).then((canvas) => {
          element.style.background = originalBg;
          element.style.padding = "10px";

          const link = document.createElement("a");
          link.download = `Torneo-${state.name.replace(/\s+/g, "-")}.png`;
          link.href = canvas.toDataURL();
          link.click();
        });
      }

      // --- INICIALIZACIÓN ---
      window.onload = () => {
        loadState();
        render();
        setupPwaUi();
        registerServiceWorker();
      };
    </script>
  </body>
</html>
